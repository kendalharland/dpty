<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Browser PTY</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace;
    }

    /* Center the whole app in the page */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 900px;
      padding: 24px;
      box-sizing: border-box;
    }

    #prompt-container {
      margin-bottom: 16px;
      text-align: center;
    }

    #prompt-input {
      width: 100%;
      max-width: 700px;
      padding: 6px 10px;
      font-family: "SF Mono", Menlo, monospace;
      font-size: 14px;
      background: #000;
      color: #eee;
      border: 1px solid #444;
      border-radius: 4px;
      box-sizing: border-box;
    }

    #prompt-help {
      margin-top: 6px;
      font-size: 12px;
      color: #aaa;
    }

    /* Center the terminal window itself; don't style inside it */
    #terminal-container {
      display: none;          /* shown after prompt submit */
      margin: 16px auto 0;    /* auto centers horizontally */
      border: 1px solid #444;
      border-radius: 4px;
      background: #000;
      padding: 4px;
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div class="app">
    <div id="prompt-container">
      <h1>Claude Shell</h1>
      <p>Describe what you want Claude to do, then press Enter.</p>
      <form id="prompt-form">
        <input id="prompt-input" type="text" autocomplete="off" autofocus />
        <div id="prompt-help">
          Press Enter to start · A dedicated PTY will be created for this prompt.
        </div>
      </form>
    </div>

    <div id="terminal-container">
      <div id="terminal-inner"></div>
    </div>
  </div>

  <script src="https://unpkg.com/@xterm/xterm/lib/xterm.js"></script>
  <script>
    (function () {
      const promptContainer = document.getElementById('prompt-container');
      const promptForm = document.getElementById('prompt-form');
      const promptInput = document.getElementById('prompt-input');
      const termContainer = document.getElementById('terminal-container');
      const termInner = document.getElementById('terminal-inner');

      const term = new window.Terminal({
        cursorBlink: true,
        fontFamily: 'SF Mono, Menlo, monospace',
        fontSize: 14,
        theme: {
          background: '#000000',
          foreground: '#eeeeee'
        }
      });

      term.open(termInner);

      // Make sure clicking in the terminal restores keyboard focus
      termContainer.addEventListener('mousedown', () => {
        term.focus();
      });

      function startSession(initialPrompt) {
        try {
          term.resize(100, 35);
        } catch (e) {
          console.error('term.resize failed', e);
        }

        const wsUrl = 'ws://' + window.location.host + '/pty';
        const ws = new WebSocket(wsUrl);
        ws.binaryType = 'arraybuffer';

        let initialPromptSent = false;

        ws.onopen = function () {
          if (!initialPrompt || initialPromptSent) return;

          if (ws.readyState === WebSocket.OPEN && !initialPromptSent) {
            setTimeout(() => {
              const text = initialPrompt;
              ws.send(text);
              setTimeout(() => {
                ws.send('\r');
                initialPromptSent = true;
              }, 700);
            }, 700);
          }
        };

        ws.onclose = function () {
          term.write('\r\n[Disconnected]\r\n');
        };

        ws.onerror = function (err) {
          term.write('\r\n[WebSocket error]\r\n');
          console.error('WebSocket error:', err);
        };

        ws.onmessage = function (ev) {
          if (ev.data instanceof ArrayBuffer) {
            const text = new TextDecoder('utf-8').decode(new Uint8Array(ev.data));
            term.write(text);
          } else {
            term.write(ev.data);
          }
        };

        // Your existing escape-sequence handling
        let escState = 'idle';
        let escBuf = '';
        let escTimer = null;
        const ESC = '\x1b';
        const ESC_TIMEOUT_MS = 50;

        function resetEsc() {
          escState = 'idle';
          escBuf = '';
          if (escTimer) {
            clearTimeout(escTimer);
            escTimer = null;
          }
        }

        function flushEscBuf() {
          if (!escBuf) return;
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(escBuf);
          }
          resetEsc();
        }

        function scheduleEscTimeout() {
          if (escTimer) {
            clearTimeout(escTimer);
          }
          escTimer = setTimeout(() => {
            flushEscBuf();
          }, ESC_TIMEOUT_MS);
        }

        function handleInputChunk(data) {
          if (ws.readyState !== WebSocket.OPEN) return;

          for (let i = 0; i < data.length; i++) {
            const ch = data[i];

            if (escState === 'idle') {
              if (ch === ESC) {
                escState = 'esc';
                escBuf = ch;
                scheduleEscTimeout();
              } else {
                ws.send(ch);
              }
              continue;
            }

            escBuf += ch;

            if (escState === 'esc') {
              if (ch === '[') {
                escState = 'csi';
                scheduleEscTimeout();
                continue;
              }
              if (ch === 'O') {
                escState = 'ss3';
                scheduleEscTimeout();
                continue;
              }
              flushEscBuf();
              continue;
            }

            if (escState === 'csi') {
              const code = ch.charCodeAt(0);
              if (code >= 0x40 && code <= 0x7e) {
                flushEscBuf();
              } else {
                scheduleEscTimeout();
              }
              continue;
            }

            if (escState === 'ss3') {
              flushEscBuf();
              continue;
            }
          }
        }

        term.onData(handleInputChunk);
      }

      promptForm.addEventListener('submit', function (e) {
        e.preventDefault();
        const prompt = promptInput.value.trim();
        if (!prompt) return;

        promptContainer.style.display = 'none';
        termContainer.style.display = 'block';
        startSession(prompt);
      });
    })();
  </script>
</body>
</html>
