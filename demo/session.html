<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Browser PTY — Session</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 24px;
      box-sizing: border-box;
      gap: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    #back-link {
      color: #8ab4ff;
      text-decoration: none;
      font-size: 13px;
    }
    #back-link:hover { text-decoration: underline; }

    #title {
      color: #999;
      font-size: 12px;
      font-family: "SF Mono", Menlo, monospace;
    }

    #status {
      color: #ff7070;
      font-size: 12px;
      min-height: 1em;
    }

    #terminal-container {
      border: 1px solid #444;
      border-radius: 4px;
      background: #000;
      padding: 4px;
      box-sizing: border-box;
      width: 820px;
      height: 540px;
      min-width: 320px;
      min-height: 200px;
      max-width: 100%;
      resize: both;
      overflow: hidden;
    }

    #terminal-inner {
      width: 100%;
      height: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/@xterm/xterm/css/xterm.css">
  <script src="https://unpkg.com/@xterm/xterm/lib/xterm.js"></script>
  <script src="https://unpkg.com/@xterm/addon-fit/lib/addon-fit.js"></script>
</head>
<body>
  <div class="topbar">
    <a id="back-link" href="index.html">&larr; Back to sessions</a>
    <div id="title"></div>
  </div>

  <div id="status"></div>

  <div id="terminal-container">
    <div id="terminal-inner"></div>
  </div>

  <script type="module">
    import { Attachment } from './dpty.js';

    const params = new URLSearchParams(window.location.search);
    const serverAddress = params.get('server');
    const alias = params.get('alias');

    const titleEl = document.getElementById('title');
    const statusEl = document.getElementById('status');
    const termContainer = document.getElementById('terminal-container');
    const termInner = document.getElementById('terminal-inner');

    if (alias) {
      titleEl.textContent = alias.slice(0, 8) + ' @ ' + (serverAddress || '?');
    }

    if (!serverAddress || !alias) {
      statusEl.textContent = 'server and alias query params required';
    } else {
      runTerminal();
    }

    function runTerminal() {
      const term = new window.Terminal({
        cursorBlink: true,
        fontFamily: 'SF Mono, Menlo, monospace',
        fontSize: 14,
        theme: { background: '#000000', foreground: '#eeeeee' },
      });
      const fitAddon = new window.FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(termInner);

      termContainer.addEventListener('mousedown', () => term.focus());

      const att = new Attachment(serverAddress, alias, {
        onOutput: (text) => term.write(text),
        onOpen: () => {
          requestAnimationFrame(fitAndSendResize);
          term.focus();
        },
        onClose: () => term.write('\r\n[Disconnected]\r\n'),
        onError: (err) => {
          term.write('\r\n[WebSocket error]\r\n');
          console.error('WebSocket error:', err);
        },
      });

      function fitAndSendResize() {
        const r = termContainer.getBoundingClientRect();
        if (r.width < 10 || r.height < 10) return;
        try { fitAddon.fit(); } catch (e) { return; }
        att.resize(term.cols, term.rows);
      }

      let resizeTimer = null;
      function scheduleFit() {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(fitAndSendResize, 80);
      }
      new ResizeObserver(scheduleFit).observe(termContainer);
      window.addEventListener('resize', scheduleFit);

      // Escape-sequence chunking: coalesce multi-byte sequences (arrow keys
      // etc.) into a single WebSocket frame for efficiency. Not required
      // for correctness — the dpty wire protocol accepts any number of
      // BINARY frames in any order.
      let escState = 'idle';
      let escBuf = '';
      let escTimer = null;
      const ESC = '\x1b';
      const ESC_TIMEOUT_MS = 50;

      function resetEsc() {
        escState = 'idle'; escBuf = '';
        if (escTimer) { clearTimeout(escTimer); escTimer = null; }
      }
      function flushEscBuf() {
        if (escBuf) att.send(escBuf);
        resetEsc();
      }
      function scheduleEscTimeout() {
        if (escTimer) clearTimeout(escTimer);
        escTimer = setTimeout(flushEscBuf, ESC_TIMEOUT_MS);
      }

      term.onData((data) => {
        for (let i = 0; i < data.length; i++) {
          const ch = data[i];
          if (escState === 'idle') {
            if (ch === ESC) { escState = 'esc'; escBuf = ch; scheduleEscTimeout(); }
            else att.send(ch);
            continue;
          }
          escBuf += ch;
          if (escState === 'esc') {
            if (ch === '[') { escState = 'csi'; scheduleEscTimeout(); continue; }
            if (ch === 'O') { escState = 'ss3'; scheduleEscTimeout(); continue; }
            flushEscBuf(); continue;
          }
          if (escState === 'csi') {
            const code = ch.charCodeAt(0);
            if (code >= 0x40 && code <= 0x7e) flushEscBuf();
            else scheduleEscTimeout();
            continue;
          }
          if (escState === 'ss3') { flushEscBuf(); continue; }
        }
      });
    }
  </script>
</body>
</html>
